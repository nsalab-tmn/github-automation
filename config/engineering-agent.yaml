agent:
  project-number: 6
  schedule: "0 8 * * 1-5"          # weekdays 8am UTC
  max-file-count: 10
  max-diff-lines: 499
  timeout-minutes: 30
  max-attempts: 3
  excluded-labels:
    - pinned
    - needs-triage
    - stale
  # Crawl phase: only pick issues with ALL of these labels
  require-labels:
    - compliance
  # Board column names — must match project board exactly (case-sensitive)
  status:
    backlog: Backlog
    blocked: Blocked
    in-progress: In progress
    in-review: In review
    done: Done
  # Which statuses the agent can pick issues from
  eligible-statuses:
    - Backlog
    - In progress

projects:
  - name: cheburnet
    knowledge-base: nsalab-tmn/cheburnet-knowledge-base
    conventions-path: conventions
    repos:
      - nsalab-tmn/cheburnet-knowledge-base
      - nsalab-tmn/cheburnet-vpn
      - nsalab-tmn/cheburnet-infra
      - nsalab-tmn/cheburnet-mtproxy
      - nsalab-tmn/cheburnet-monitoring
      - nsalab-tmn/cheburnet-router

  - name: github-maintenance
    knowledge-base: nsalab-tmn/github-automation
    conventions-path: docs
    project-number: 7
    repos:
      - nsalab-tmn/github-automation
      - nsalab-tmn/template-gitops
      - nsalab-tmn/template-generic
