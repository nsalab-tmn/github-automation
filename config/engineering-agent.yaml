agent:
  project-number: 3
  schedule: "0 8 * * 1-5"          # weekdays 8am UTC
  max-file-count: 10
  max-diff-lines: 499
  timeout-minutes: 30
  max-attempts: 3
  excluded-labels:
    - pinned
    - needs-triage
    - stale
  eligible-statuses:
    - Backlog
    - In Progress

projects:
  - name: cheburnet
    knowledge-base: nsalab-tmn/cheburnet-knowledge-base
    conventions-path: conventions
    repos:
      - nsalab-tmn/cheburnet-knowledge-base
      - nsalab-tmn/cheburnet-vpn
      - nsalab-tmn/cheburnet-infra
      - nsalab-tmn/cheburnet-mtproxy
      - nsalab-tmn/cheburnet-monitoring
      - nsalab-tmn/cheburnet-router
