agent:
  project-number: 6
  schedule: "30 * * * *"            # every hour at :30 (informational — workflow file is source of truth)
  timeout-minutes: 15
  max-review-attempts: 3
  require-pr-labels:
    - ai-generated
  excluded-pr-labels:
    - needs-triage
    - stale
  eligible-statuses:
    - In review
  # Board column names (case-sensitive)
  status:
    backlog: Backlog
    blocked: Blocked
    in-progress: In progress
    in-review: In review
    done: Done
  # Crawl phase
  auto-merge: true
  confidence-threshold: high

projects:
  - name: cheburnet
    knowledge-base: nsalab-tmn/cheburnet-knowledge-base
    conventions-path: conventions
    project-number: 6
    repos:
      - nsalab-tmn/cheburnet-knowledge-base
      - nsalab-tmn/cheburnet-vpn
      - nsalab-tmn/cheburnet-infra
      - nsalab-tmn/cheburnet-mtproxy
      - nsalab-tmn/cheburnet-monitoring
      - nsalab-tmn/cheburnet-router

  - name: github-maintenance
    knowledge-base: nsalab-tmn/github-automation
    conventions-path: docs
    project-number: 7
    repos:
      - nsalab-tmn/github-automation
      - nsalab-tmn/template-gitops
      - nsalab-tmn/template-generic
