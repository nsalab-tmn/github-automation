rulesets:
  - name: require-pull-request
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    bypass_actors:
      - actor_id: 1
        actor_type: OrganizationAdmin
        bypass_mode: always
      # doorman can push initial commits to bootstrap new repos
      - actor_id: 3493789
        actor_type: Integration
        bypass_mode: always
    rules:
      non_fast_forward: true
      deletion: true
      pull_request:
        required_approving_review_count: 0
        dismiss_stale_reviews_on_push: false
        allowed_merge_methods: ["squash"]

  - name: require-pr-validation
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    bypass_actors:
      - actor_id: 1
        actor_type: OrganizationAdmin
        bypass_mode: always
      # doorman can push initial commits to bootstrap new repos
      - actor_id: 3493789
        actor_type: Integration
        bypass_mode: always
    rules:
      non_fast_forward: true
      required_status_checks:
        strict: false
        checks:
          - context: "PR Validation"

  - name: branch-naming-convention
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include: ["refs/heads/*"]
        exclude: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    rules:
      branch_name_pattern:
        operator: regex
        pattern: "^(feature|fix|docs|infra|cleanup)/[0-9]+-[a-z0-9-]+$"
