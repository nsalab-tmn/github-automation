rulesets:
  - name: require-pull-request
    target: branch
    enforcement: active
    bypass_actors:
      - actor_id: 3493789  # nsalab-doorman (repo bootstrapping from templates)
        actor_type: Integration
        bypass_mode: always
    conditions:
      ref_name:
        include: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    rules:
      non_fast_forward: true
      deletion: true
      pull_request:
        required_approving_review_count: 0
        dismiss_stale_reviews_on_push: false
        allowed_merge_methods: ["squash"]

  - name: require-pr-validation
    target: branch
    enforcement: active
    bypass_actors:
      - actor_id: 3493789  # nsalab-doorman (repo bootstrapping from templates)
        actor_type: Integration
        bypass_mode: always
    conditions:
      ref_name:
        include: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    rules:
      non_fast_forward: true
      required_status_checks:
        strict: false
        do_not_enforce_on_create: true
        checks:
          - context: "PR Validation"

  - name: branch-naming-convention
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include: ["refs/heads/*"]
        exclude: ["~DEFAULT_BRANCH"]
      repository_name:
        include: ["~ALL"]
    rules:
      branch_name_pattern:
        operator: regex
        pattern: "^(feature|fix|docs|infra|cleanup)/[0-9]+-[a-z0-9-]+$"
