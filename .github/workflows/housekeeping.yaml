name: housekeeping
run-name: "[${{github.run_number}}] Housekeeping [${{github.event_name}}]"

on:
  issues:
    types: [opened, typed]
  pull_request:
    types: [opened, synchronize, edited, labeled, unlabeled, ready_for_review, review_requested, closed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  auto-assign:
    if: >-
      (github.event_name == 'issues' && github.event.action == 'opened')
      || (github.event_name == 'pull_request' && github.event.action == 'opened')
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-auto-assign.yaml@main
    with:
      default-assignee: menus12

  auto-label:
    if: >-
      github.event_name == 'pull_request'
      && contains(fromJSON('["opened","synchronize"]'), github.event.action)
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-auto-label.yaml@main
    with:
      label-config: |
        {
          "ci-cd": [".github/**", "scripts/**", "templates/**"],
          "documentation": ["docs/**", "*.md"]
        }

  pr-size:
    if: >-
      github.event_name == 'pull_request'
      && contains(fromJSON('["opened","synchronize"]'), github.event.action)
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-pr-size.yaml@main

  branch-validate:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-branch-validate.yaml@main

  pr-validate:
    needs: [auto-label, pr-size]
    if: github.event_name == 'pull_request' && always()
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-pr-validate.yaml@main
    with:
      require-issue: true
      require-labels: true
      require-description: true

  auto-project:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-auto-project.yaml@main
    with:
      project-number: 7
      type-mapping: |
        {
          "bug": "Bug",
          "enhancement": "Feature"
        }
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  mechanic-dispatch:
    needs: auto-project
    if: >-
      github.event_name == 'issues' && github.event.action == 'opened'
      && needs.auto-project.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MECHANIC_CLIENT_ID }}
          private-key: ${{ secrets.MECHANIC_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Dispatch engineering agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run engineering-agent --repo nsalab-tmn/github-automation -f issue-url="${{ github.event.issue.html_url }}"

  issue-defaults:
    if: github.event_name == 'issues'
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-issue-defaults.yaml@main
    with:
      project-number: 7
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  project-sync:
    if: >-
      github.event_name == 'pull_request_review'
      || (github.event_name == 'pull_request'
          && contains(fromJSON('["ready_for_review","review_requested","closed"]'),
                      github.event.action))
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-project-sync.yaml@main
    with:
      project-number: 7
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  bulk-assign:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign all unassigned open issues
        uses: actions/github-script@v8
        with:
          script: |
            const defaultAssignee = 'menus12';
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            let assigned = 0;
            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (issue.assignees && issue.assignees.length > 0) continue;

              const assignee = issue.user.login || defaultAssignee;
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: [assignee],
                });
                core.info(`Assigned #${issue.number} to @${assignee}`);
                assigned++;
              } catch {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: [defaultAssignee],
                });
                core.info(`Assigned #${issue.number} to default @${defaultAssignee}`);
                assigned++;
              }
            }
            core.summary.addRaw(`✓ Assigned ${assigned} issue(s)`);
            await core.summary.write();
