name: review-agent
run-name: "[${{github.run_number}}] Review agent [${{github.event_name}}]"

on:
  schedule:
    - cron: '30 * * * *'  # every hour at :30, offset from mechanic at :00
  workflow_dispatch:
    inputs:
      pr-url:
        description: 'Optional: specific PR URL to review (skips selection)'
        required: false
        type: string
      dry-run:
        description: 'Dry run — gather + decide only, skip posting review'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: review-agent
  cancel-in-progress: false

jobs:
  review-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout github-automation
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BEEKEEPER_CLIENT_ID }}
          private-key: ${{ secrets.BEEKEEPER_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Parse config
        id: config
        env:
          CONFIG_FILE: config/review-agent.yaml
        run: ./scripts/parse-config.sh >> "$GITHUB_OUTPUT"

      - name: Select PR
        id: select
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: nsalab-tmn
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          ELIGIBLE_STATUSES: ${{ steps.config.outputs.eligible_statuses }}
          REQUIRE_PR_LABELS: ${{ steps.config.outputs.require_pr_labels }}
          EXCLUDED_PR_LABELS: ${{ steps.config.outputs.excluded_pr_labels }}
          MAX_REVIEW_ATTEMPTS: ${{ steps.config.outputs.max_review_attempts }}
          MANUAL_PR_URL: ${{ inputs.pr-url }}
        run: |
          ./scripts/select-pr.sh > selected-pr.json
          if [[ ! -s selected-pr.json ]] || [[ "$(cat selected-pr.json)" == "" ]]; then
            echo "selected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "selected=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(jq -r '.pr_number' selected-pr.json)" >> "$GITHUB_OUTPUT"
          echo "pr_repo=$(jq -r '.issue_repo' selected-pr.json)" >> "$GITHUB_OUTPUT"
          echo "issue_number=$(jq -r '.issue_number' selected-pr.json)" >> "$GITHUB_OUTPUT"

      - name: Gather PR context
        id: gather
        if: steps.select.outputs.selected == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REPO: ${{ steps.select.outputs.pr_repo }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
          PROJECTS_JSON: ${{ steps.config.outputs.projects }}
          TARGET_REPO: ${{ steps.select.outputs.pr_repo }}
        run: |
          KB_INFO=$(./scripts/resolve-kb.sh)
          export KB_REPO=$(echo "$KB_INFO" | awk '{print $1}')
          export KB_CONV_PATH=$(echo "$KB_INFO" | awk '{print $2}')
          PROJ_NUM=$(echo "$KB_INFO" | awk '{print $3}')
          if [[ -n "$PROJ_NUM" ]]; then
            echo "project_number=$PROJ_NUM" >> "$GITHUB_OUTPUT"
          fi
          ./scripts/gather-pr-context.sh > pr-context.json

      - name: Compile review
        id: review
        if: steps.select.outputs.selected == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 ./scripts/review-pr.py pr-context.json prompts/review-brief.md schemas/review-pr.json > review.json
          echo "decision=$(jq -r '.decision' review.json)" >> "$GITHUB_OUTPUT"
          echo "confidence=$(jq -r '.confidence' review.json)" >> "$GITHUB_OUTPUT"
          echo "auto_merge=$(jq -r '.auto_merge_eligible' review.json)" >> "$GITHUB_OUTPUT"
          echo "::notice::Decision: $(jq -r '.decision' review.json), Confidence: $(jq -r '.confidence' review.json), Auto-merge eligible: $(jq -r '.auto_merge_eligible' review.json)"

      - name: Post review
        if: steps.select.outputs.selected == 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REPO: ${{ steps.select.outputs.pr_repo }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          PROJECT_NUMBER: ${{ steps.gather.outputs.project_number || steps.config.outputs.project_number }}
          STATUS_IN_PROGRESS: ${{ steps.config.outputs.status_in_progress }}
          REVIEW_FILE: review.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: ./scripts/post-review.sh

      - name: Auto-merge eligible PR
        id: auto-merge
        if: steps.select.outputs.selected == 'true' && inputs.dry-run != true && steps.review.outputs.decision == 'approve'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REPO: ${{ steps.select.outputs.pr_repo }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
          REVIEW_AUTO_MERGE: ${{ steps.review.outputs.auto_merge }}
          CONFIG_AUTO_MERGE: ${{ steps.config.outputs.auto_merge }}
        run: |
          echo "merged=false" >> "$GITHUB_OUTPUT"
          if [[ "$REVIEW_AUTO_MERGE" != "true" ]] || [[ "$CONFIG_AUTO_MERGE" != "True" ]]; then
            echo "::notice::Auto-merge not eligible (review=$REVIEW_AUTO_MERGE, config=$CONFIG_AUTO_MERGE) — skipping"
            exit 0
          fi
          echo "::notice::Auto-merge eligible — waiting for mergeable state on PR #${PR_NUMBER}"
          # Wait for GitHub to report the PR as mergeable (ruleset checks satisfied)
          for i in $(seq 1 18); do
            MERGE_STATE=$(gh pr view "$PR_NUMBER" --repo "$PR_REPO" --json mergeStateStatus --jq '.mergeStateStatus' 2>/dev/null || echo "UNKNOWN")
            echo "::notice::  Merge state: ${MERGE_STATE} (poll ${i}/18)"
            if [[ "$MERGE_STATE" == "CLEAN" ]]; then
              echo "::notice::PR is mergeable — squash-merging"
              break
            elif [[ "$MERGE_STATE" == "BLOCKED" || "$MERGE_STATE" == "DIRTY" ]]; then
              echo "::warning::PR merge state is ${MERGE_STATE} — skipping auto-merge"
              exit 0
            fi
            sleep 10
          done
          if gh pr merge "$PR_NUMBER" --repo "$PR_REPO" --squash; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Auto-merge failed"
          fi

      - name: Notify Telegram on approve
        id: notify-telegram
        if: steps.select.outputs.selected == 'true' && inputs.dry-run != true && steps.review.outputs.decision == 'approve'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TRANSPORTER_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TRANSPORTER_CHAT_ID }}
          REVIEW_FILE: review.json
          PR_REPO: ${{ steps.select.outputs.pr_repo }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUTO_MERGED: ${{ steps.auto-merge.outputs.merged }}
        run: bash scripts/notify-telegram.sh

      - name: Session summary
        if: always()
        env:
          AGENT_NAME: Review Agent
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
          SELECTED: ${{ steps.select.outputs.selected }}
          SUMMARY_ITEM: "${{ steps.select.outputs.pr_repo }}#${{ steps.select.outputs.pr_number }}"
          SUMMARY_EXTRA: "**Issue:** #${{ steps.select.outputs.issue_number }}"
          RESULT_FILE: review.json
          RESULT_FIELDS: >-
            "**Decision:** \(.decision)\n**Confidence:** \(.confidence)\n**Summary:** \(.summary)\n\n- Addresses issue: \(.addresses_issue)\n- Follows conventions: \(.follows_conventions)\n- Minimal change: \(.minimal_change)\n- Auto-merge eligible: \(.auto_merge_eligible)"
          CI_WAIT_SECONDS: ${{ steps.gather.outputs.ci_wait_seconds }}
        run: ./scripts/session-summary.sh
