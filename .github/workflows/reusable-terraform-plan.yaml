name: reusable - terraform-plan

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: terraform
        description: Directory containing Terraform config
      terraform-version:
        type: string
        default: latest
        description: Terraform version to install
    secrets:
      doorman-client-id:
        required: true
      doorman-private-key:
        required: true
      arm-client-id:
        required: true
      arm-client-secret:
        required: true
      arm-tenant-id:
        required: true
      arm-subscription-id:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.doorman-client-id }}
          private-key: ${{ secrets.doorman-private-key }}
          owner: nsalab-tmn

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.arm-client-id }}
          ARM_CLIENT_SECRET: ${{ secrets.arm-client-secret }}
          ARM_TENANT_ID: ${{ secrets.arm-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.arm-subscription-id }}
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_github_token: ${{ steps.app-token.outputs.token }}
          TF_VAR_github_owner: nsalab-tmn
          ARM_CLIENT_ID: ${{ secrets.arm-client-id }}
          ARM_CLIENT_SECRET: ${{ secrets.arm-client-secret }}
          ARM_TENANT_ID: ${{ secrets.arm-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.arm-subscription-id }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const planFile = '${{ inputs.working-directory }}/plan-output.txt';
            const output = fs.readFileSync(planFile, 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n... (truncated)' : output;
            const conclusion = '${{ steps.plan.outcome }}';

            const body = `### Terraform Plan ${conclusion === 'success' ? '✅' : '❌'}

            <details><summary>Plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            *Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            const marker = '<!-- terraform-plan -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Check plan result
        if: steps.plan.outcome == 'failure'
        run: exit 1
