name: drift-detect
run-name: "[${{github.run_number}}] Drift detect [${{github.event_name}}]"

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run — gather + decide, log decisions without creating issues'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  drift-detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LIBRARIAN_CLIENT_ID }}
          private-key: ${{ secrets.LIBRARIAN_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Install Python dependencies
        run: pip install anthropic pyyaml

      - name: Parse project config
        id: config
        run: |
          python3 -c "
          import yaml, json
          with open('config/drift-projects.yaml') as f:
              config = yaml.safe_load(f)
              print(json.dumps(config['projects']))
          " > projects.json
          python3 -c "
          import yaml
          with open('config/drift-projects.yaml') as f:
              config = yaml.safe_load(f)
          print(f\"project_number={config.get('project-number', 6)}\")
          " >> "$GITHUB_OUTPUT"
          CONFIG_FILE=config/engineering-agent.yaml ./scripts/parse-config.sh >> "$GITHUB_OUTPUT"

      - name: Gather and analyze each project
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADOPTION_GUIDE: docs/adoption.md
        run: |
          PROJECT_COUNT=$(jq length projects.json)
          echo "[]" > all-findings.json

          for i in $(seq 0 $((PROJECT_COUNT - 1))); do
            PROJECT=$(jq ".[$i]" projects.json)
            PROJECT_NAME=$(echo "$PROJECT" | jq -r '.name')
            echo "::group::Gathering state for project: ${PROJECT_NAME}"

            export PROJECT_CONFIG="$PROJECT"
            ./scripts/gather-drift-state.sh > "drift-state-${PROJECT_NAME}.json"

            echo "::endgroup::"
            echo "::group::Analyzing project: ${PROJECT_NAME}"

            python3 ./scripts/drift-detect.py \
              "drift-state-${PROJECT_NAME}.json" \
              prompts/drift-review.md \
              schemas/drift-findings.json \
              > "findings-${PROJECT_NAME}.json"

            cat "findings-${PROJECT_NAME}.json"
            jq --slurpfile f "findings-${PROJECT_NAME}.json" '. + $f' all-findings.json > all-findings.tmp && mv all-findings.tmp all-findings.json

            echo "::endgroup::"
          done

          # Step summary
          echo "## Drift Detection Results" >> "$GITHUB_STEP_SUMMARY"
          for i in $(seq 0 $((PROJECT_COUNT - 1))); do
            PROJECT_NAME=$(jq -r ".[$i].name" projects.json)
            if [ -f "findings-${PROJECT_NAME}.json" ]; then
              FINDING_COUNT=$(jq '.findings | length' "findings-${PROJECT_NAME}.json")
              SUMMARY=$(jq -r '.summary' "findings-${PROJECT_NAME}.json")
              echo "### ${PROJECT_NAME}: ${FINDING_COUNT} finding(s)" >> "$GITHUB_STEP_SUMMARY"
              echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Gather compliance state
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: nsalab-tmn
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
        run: |

          echo "::group::Gathering compliance state (project #${PROJECT_NUMBER})"
          echo "{}" > compliance-state.json
          PROJECT_COUNT=$(jq length projects.json)
          for i in $(seq 0 $((PROJECT_COUNT - 1))); do
            REPOS=$(jq -r ".[$i].repos[]" projects.json)
            for repo in $REPOS; do
              export REPO="$repo"
              ./scripts/gather-compliance-state.sh > "compliance-${repo//\//-}.json"
              jq --arg r "$repo" --slurpfile s "compliance-${repo//\//-}.json" '. + {($r): $s[0]}' compliance-state.json > compliance-state.tmp && mv compliance-state.tmp compliance-state.json
            done
          done
          echo "::endgroup::"

      - name: Execute actions
        if: always() && hashFiles('all-findings.json') != ''
        env:
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const allFindings = JSON.parse(fs.readFileSync('all-findings.json', 'utf8'));
            const projects = JSON.parse(fs.readFileSync('projects.json', 'utf8'));
            const complianceState = fs.existsSync('compliance-state.json')
              ? JSON.parse(fs.readFileSync('compliance-state.json', 'utf8'))
              : {};
            const dryRun = process.env.DRY_RUN === 'true';

            if (dryRun) core.notice('DRY RUN — no issues will be created or modified');

            // Build lookup of valid repos from config for normalization
            const validRepos = new Set();
            for (const project of projects) {
              for (const r of project.repos) validRepos.add(r);
              validRepos.add(project['knowledge-base']);
            }

            // Fetch project board IDs per board number (for adding new issues to board)
            const globalProjectNumber = parseInt(process.env.PROJECT_NUMBER) || 6;
            const boardDataByNumber = new Map();
            const boardNumbers = new Set([globalProjectNumber]);
            for (const p of projects) {
              if (p['project-number']) boardNumbers.add(p['project-number']);
            }
            for (const num of boardNumbers) {
              try {
                const pData = await github.graphql(`
                  query($org: String!, $number: Int!) {
                    organization(login: $org) {
                      projectV2(number: $number) {
                        id
                        status: field(name: "Status") {
                          ... on ProjectV2SingleSelectField {
                            id
                            options { id name }
                          }
                        }
                        priority: field(name: "Priority") {
                          ... on ProjectV2SingleSelectField {
                            id
                            options { id name }
                          }
                        }
                        size: field(name: "Size") {
                          ... on ProjectV2SingleSelectField {
                            id
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                `, { org: 'nsalab-tmn', number: num });
                boardDataByNumber.set(num, {
                  projectId: pData.organization.projectV2.id,
                  statusFieldId: pData.organization.projectV2.status.id,
                  backlogOptionId: pData.organization.projectV2.status.options.find(o => o.name === 'Backlog')?.id,
                  priorityFieldId: pData.organization.projectV2.priority?.id,
                  priorityOptions: pData.organization.projectV2.priority?.options || [],
                  sizeFieldId: pData.organization.projectV2.size?.id,
                  sizeOptions: pData.organization.projectV2.size?.options || [],
                });
              } catch (e) {
                core.warning(`Could not fetch project board IDs for board #${num}: ${e.message}`);
              }
            }

            let totalCreated = 0;
            let totalSkipped = 0;
            let totalSuppressed = 0;
            let totalBoardAdded = 0;
            const decisions = []; // for dry-run summary

            const seenFindings = new Set();

            for (const projectFindings of allFindings) {
              const project = projectFindings.project;

              for (const finding of (projectFindings.findings || [])) {
                // Normalize repo: Claude sometimes outputs short names
                let repoFull = finding.repo;
                if (!repoFull.includes('/')) {
                  const match = [...validRepos].find(r => r.endsWith(`/${repoFull}`) || r.endsWith(`-${repoFull}`) || r === repoFull);
                  repoFull = match || `nsalab-tmn/${repoFull}`;
                }
                const [owner, repo] = repoFull.split('/');
                const repoProject = projects.find(p => p.repos && p.repos.includes(repoFull));
                const boardNumber = repoProject?.['project-number'] || globalProjectNumber;
                const { projectId, statusFieldId, backlogOptionId, priorityFieldId, priorityOptions, sizeFieldId, sizeOptions } = boardDataByNumber.get(boardNumber) || {};
                const convFile = finding.convention_file.toLowerCase();
                const key = (finding.finding_key || convFile).toLowerCase().replace(/[^a-z0-9-]/g, '-');
                const findingId = `${finding.type}:${convFile}:${key}`;
                const marker = `<!-- drift:${findingId} -->`;

                // Dedup: skip if we already processed this repo+type+convention combo
                const dedupKey = `${repoFull}:${findingId}`;
                if (seenFindings.has(dedupKey)) {
                  continue;
                }
                seenFindings.add(dedupKey);

                // --- Enhanced filtering using compliance state ---
                const repoState = complianceState[repoFull] || {};
                const openIssues = repoState.open_compliance_issues || [];
                const closedIssues = repoState.recently_closed_compliance || [];

                // Check 1: Open issue with same marker
                const existingOpen = openIssues.find(i => i.marker === findingId);
                if (existingOpen) {
                  // Check 1a: Has needs-triage label
                  if (existingOpen.labels?.includes('needs-triage')) {
                    core.notice(`Suppressed (needs-triage): ${repoFull} — ${convFile} (existing #${existingOpen.number})`);
                    decisions.push({ repo: repoFull, finding: convFile, action: 'skip-needs-triage', issue: existingOpen.number });
                    totalSuppressed++;
                    continue;
                  }
                  // Check 1b: Has open PR
                  if (existingOpen.has_open_pr) {
                    core.notice(`Suppressed (PR open): ${repoFull} — ${convFile} (existing #${existingOpen.number})`);
                    decisions.push({ repo: repoFull, finding: convFile, action: 'skip-pr-open', issue: existingOpen.number });
                    totalSuppressed++;
                    continue;
                  }
                  // Default: existing open issue without PR or triage
                  core.notice(`Skipped duplicate: ${repoFull} — ${convFile} (existing #${existingOpen.number})`);
                  decisions.push({ repo: repoFull, finding: convFile, action: 'skip-duplicate', issue: existingOpen.number });
                  totalSkipped++;
                  continue;
                }

                // Check 2: Recently closed issue with same marker (completed within suppression window)
                const recentlyClosed = closedIssues.find(i => i.marker === findingId && i.state_reason === 'completed');
                if (recentlyClosed) {
                  core.notice(`Suppressed (recently fixed): ${repoFull} — ${convFile} (closed #${recentlyClosed.number} at ${recentlyClosed.closed_at})`);
                  decisions.push({ repo: repoFull, finding: convFile, action: 'skip-recently-fixed', issue: recentlyClosed.number });
                  totalSuppressed++;
                  continue;
                }

                // --- No suppression — create issue ---
                decisions.push({ repo: repoFull, finding: convFile, action: 'create' });

                if (dryRun) {
                  core.notice(`[DRY RUN] Would create issue in ${repoFull}: Convention ${finding.type}: ${convFile}`);
                  totalCreated++;
                  continue;
                }

                const severityEmoji = { high: '🔴', medium: '🟡', low: '🔵' }[finding.severity] || '⚪';
                const body = [
                  marker,
                  `### Convention ${finding.type}: ${finding.convention_file}`,
                  '',
                  `**Detail:** ${finding.convention_detail}`,
                  '',
                  `**Severity:** ${severityEmoji} ${finding.severity}`,
                  `**Type:** ${finding.type}`,
                  '',
                  `**Expected:** ${finding.expected}`,
                  '',
                  `**Actual:** ${finding.actual}`,
                  '',
                  `**Recommendation:** ${finding.recommendation}`,
                  '',
                  `---`,
                  `*Created by [convention drift detector](https://github.com/apps/nsalab-librarian)*`,
                ].join('\n');

                try {
                  // Ensure compliance label exists
                  try {
                    await github.rest.issues.getLabel({ owner, repo, name: 'compliance' });
                  } catch {
                    await github.rest.issues.createLabel({
                      owner, repo,
                      name: 'compliance',
                      color: 'B60205',
                      description: 'Convention compliance finding',
                    });
                  }

                  const categoryMap = {
                    'repo-documentation.md': 'documentation',
                    'cicd-workflows.md': 'ci-cd',
                    'adoption-guide.md': 'ci-cd',
                    'ansible-conventions.md': 'configuration',
                  };
                  const categoryLabel = categoryMap[convFile];
                  const labels = ['compliance', 'ai-generated'];
                  if (categoryLabel) labels.push(categoryLabel);

                  const issueTitle = `Convention ${finding.type}: ${convFile}`;
                  const created = await github.rest.issues.create({
                    owner, repo,
                    title: issueTitle,
                    body,
                    labels,
                  });
                  core.info(`Created issue in ${repoFull}: ${convFile} (#${created.data.number})`);
                  totalCreated++;

                  // Add to project board
                  if (projectId && created.data.node_id) {
                    try {
                      const addResult = await github.graphql(`
                        mutation($projectId: ID!, $contentId: ID!) {
                          addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                            item { id }
                          }
                        }
                      `, { projectId, contentId: created.data.node_id });

                      const itemId = addResult.addProjectV2ItemById?.item?.id;

                      // Set status to Backlog
                      if (backlogOptionId && itemId) {
                        await github.graphql(`
                          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                            updateProjectV2ItemFieldValue(input: {
                              projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                              value: { singleSelectOptionId: $optionId }
                            }) { projectV2Item { id } }
                          }
                        `, {
                          projectId,
                          itemId,
                          fieldId: statusFieldId,
                          optionId: backlogOptionId,
                        });
                      }

                      // Set Priority based on severity (high→P1, medium→P2, low→P3)
                      if (priorityFieldId && itemId) {
                        const severityToPriority = { high: 'P1', medium: 'P2', low: 'P3' };
                        const targetPriority = severityToPriority[finding.severity] || 'P3';
                        const priorityOptionId = priorityOptions.find(o => o.name === targetPriority)?.id;
                        if (priorityOptionId) {
                          await github.graphql(`
                            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                              updateProjectV2ItemFieldValue(input: {
                                projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                                value: { singleSelectOptionId: $optionId }
                              }) { projectV2Item { id } }
                            }
                          `, { projectId, itemId, fieldId: priorityFieldId, optionId: priorityOptionId });
                          core.info(`Set Priority to ${targetPriority} for #${created.data.number}`);
                        }
                      }

                      // Set Size to S (most compliance fixes are small)
                      if (sizeFieldId && itemId) {
                        const sizeOptionId = sizeOptions.find(o => o.name === 'S')?.id;
                        if (sizeOptionId) {
                          await github.graphql(`
                            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                              updateProjectV2ItemFieldValue(input: {
                                projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                                value: { singleSelectOptionId: $optionId }
                              }) { projectV2Item { id } }
                            }
                          `, { projectId, itemId, fieldId: sizeFieldId, optionId: sizeOptionId });
                          core.info(`Set Size to S for #${created.data.number}`);
                        }
                      }

                      core.info(`Added #${created.data.number} to project board`);
                      totalBoardAdded++;
                    } catch (e) {
                      core.warning(`Failed to add #${created.data.number} to board: ${e.message}`);
                    }
                  }
                } catch (error) {
                  core.warning(`Failed to create issue in ${repoFull}: ${error.message}`);
                }
              }
            }

            // Post summary on own pinned issue
            const pinnedIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pinned',
              state: 'open',
              per_page: 1,
            });

            if (pinnedIssues.data.length > 0 && !dryRun) {
              const pinned = pinnedIssues.data[0];
              const summaryMarker = '<!-- drift-review -->';

              let summaryBody = `${summaryMarker}\n### Drift Detection Summary\n\n`;
              for (const pf of allFindings) {
                const findings = pf.findings || [];
                const emoji = findings.length === 0 ? '🟢' : '🟡';
                summaryBody += `**${pf.project}:** ${emoji} ${findings.length} finding(s)\n`;
                summaryBody += `${pf.summary}\n\n`;
              }
              summaryBody += `Created ${totalCreated}, skipped ${totalSkipped} duplicate(s), suppressed ${totalSuppressed} (triage/PR/recent-fix), added ${totalBoardAdded} to board.\n`;
              summaryBody += `\n<sub>Last run: ${new Date().toISOString()}</sub>`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pinned.number,
              });

              const existing = comments.find(c => c.body && c.body.includes(summaryMarker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: summaryBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pinned.number,
                  body: summaryBody,
                });
              }
            }

            // Step summary (always, including dry-run)
            let summary = dryRun ? '## Drift Detection — DRY RUN\n\n' : '## Drift Detection Results\n\n';
            summary += `Created ${totalCreated}, skipped ${totalSkipped}, suppressed ${totalSuppressed}, board-added ${totalBoardAdded}\n\n`;

            if (decisions.length > 0) {
              summary += '| Repo | Finding | Action | Issue |\n|------|---------|--------|-------|\n';
              for (const d of decisions) {
                summary += `| ${d.repo} | ${d.finding} | ${d.action} | ${d.issue ? '#' + d.issue : '—'} |\n`;
              }
            }

            core.summary.addRaw(summary);
            await core.summary.write();
