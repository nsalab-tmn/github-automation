name: app-identity-test
run-name: "[${{github.run_number}}] App identity test"

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Create test issue as app
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue create \
            --repo nsalab-tmn/github-automation \
            --title "Test: app identity verification" \
            --body "This issue was created by the nsalab-automation GitHub App to verify bot identity. Safe to close."
