name: scaffold-gitops
run-name: "[${{github.run_number}}] Scaffold gitops [${{github.event.issue.title}}]"

on:
  issues:
    types: [opened]

concurrency:
  group: scaffold-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  scaffold:
    if: contains(github.event.issue.labels.*.name, 'gitops-request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse issue form
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || '';

            function getField(name) {
              const regex = new RegExp(`### ${name}\\s*\\n\\s*([\\s\\S]*?)(?=\\n###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const projectName = getField('Project name');
            const description = getField('Description');
            const justification = getField('Justification');

            if (!projectName) {
              core.setFailed('Missing required field: Project name');
              return;
            }
            if (!description) {
              core.setFailed('Missing required field: Description');
              return;
            }
            if (!justification) {
              core.setFailed('Missing required field: Justification');
              return;
            }

            const namePattern = /^[a-z0-9][a-z0-9-]*$/;
            if (!namePattern.test(projectName)) {
              core.setFailed(`Invalid project name: ${projectName} (must be lowercase alphanumeric with hyphens)`);
              return;
            }

            core.setOutput('project-name', projectName);
            core.setOutput('description', description);
            core.setOutput('justification', justification);

      - name: Check if repo already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_NAME="${{ steps.parse.outputs.project-name }}-gitops"
          if gh repo view "nsalab-tmn/${REPO_NAME}" &>/dev/null; then
            echo "::error::Repository nsalab-tmn/${REPO_NAME} already exists"
            exit 1
          fi

      - name: Add project to gitops config
        env:
          PROJECT_NAME: ${{ steps.parse.outputs.project-name }}
          DESCRIPTION: ${{ steps.parse.outputs.description }}
        run: |
          CONFIG_FILE="terraform/configs/gitops-projects.yaml"

          # Check if project already in config
          if grep -q "name: ${PROJECT_NAME}$" "${CONFIG_FILE}"; then
            echo "::error::Project ${PROJECT_NAME} already exists in ${CONFIG_FILE}"
            exit 1
          fi

          # Append entry to config
          python3 << 'PYEOF'
          import yaml, os

          config_file = os.environ["CONFIG_FILE"]
          project_name = os.environ["PROJECT_NAME"]
          description = os.environ["DESCRIPTION"]

          with open(config_file) as f:
              config = yaml.safe_load(f)

          if config.get("gitops_repos") is None:
              config["gitops_repos"] = []

          config["gitops_repos"].append({
              "name": project_name,
              "description": description
          })

          with open(config_file, "w") as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)
          PYEOF

      - name: Create PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PROJECT_NAME: ${{ steps.parse.outputs.project-name }}
          JUSTIFICATION: ${{ steps.parse.outputs.justification }}
        run: |
          BRANCH="infra/${ISSUE_NUMBER}-add-${PROJECT_NAME}-gitops"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add terraform/configs/gitops-projects.yaml
          git commit -m "Add ${PROJECT_NAME}-gitops to Terraform config

          Closes #${ISSUE_NUMBER}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "Add gitops repo: ${PROJECT_NAME}-gitops" \
            --body "$(cat <<EOF
## Summary

Create \`nsalab-tmn/${PROJECT_NAME}-gitops\` from \`template-gitops\` template.

## Justification

${JUSTIFICATION}

Closes #${ISSUE_NUMBER}
EOF
          )")

          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v8
        env:
          PR_URL: ${{ steps.pr.outputs.pr-url }}
          PROJECT_NAME: ${{ steps.parse.outputs.project-name }}
        with:
          script: |
            const prUrl = process.env.PR_URL;
            const projectName = process.env.PROJECT_NAME;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `### PR created`,
                ``,
                `**PR**: ${prUrl}`,
                `**Repo**: \`nsalab-tmn/${projectName}-gitops\` (created on merge)`,
                ``,
                `**What happens next:**`,
                `1. Terraform plan runs on the PR`,
                `2. Review and merge the PR`,
                `3. Terraform apply creates the repo from \`template-gitops\``,
                `4. This issue closes automatically`,
                ``,
                `**After repo is created:**`,
                `- Add repos to \`terraform/configs/repos.yaml\` via PR`,
                `- Configure labels in \`terraform/configs/labels.yaml\` via PR`,
              ].join('\n'),
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Scaffold failed\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            });
