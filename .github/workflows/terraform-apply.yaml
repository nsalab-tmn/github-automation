name: terraform-apply
run-name: "[${{github.run_number}}] Terraform apply [${{github.event_name}}]"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

jobs:
  apply:
    uses: nsalab-tmn/github-automation/.github/workflows/reusable-terraform-apply.yaml@main
    with:
      working-directory: terraform
    secrets:
      doorman-client-id: ${{ secrets.DOORMAN_CLIENT_ID }}
      doorman-private-key: ${{ secrets.DOORMAN_PRIVATE_KEY }}
      arm-client-id: ${{ secrets.ARM_CLIENT_ID }}
      arm-client-secret: ${{ secrets.ARM_CLIENT_SECRET }}
      arm-tenant-id: ${{ secrets.ARM_TENANT_ID }}
      arm-subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

  bootstrap:
    needs: apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Bootstrap gitops repos
        env:
          ORG: nsalab-tmn
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: ./scripts/bootstrap-gitops.sh
