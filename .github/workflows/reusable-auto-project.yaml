name: reusable: auto-project

on:
  workflow_call:
    inputs:
      project-number:
        description: 'GitHub Projects board number (org-level)'
        required: true
        type: number
      default-status:
        description: 'Default Status value for newly added items (e.g., Backlog)'
        required: false
        type: string
        default: ''
      type-mapping:
        description: 'JSON mapping of label names to native issue type names'
        required: false
        type: string
        default: ''
      default-type:
        description: 'Default issue type when no label matches type-mapping (e.g., Task)'
        required: false
        type: string
        default: ''
    secrets:
      app-id:
        description: 'GitHub App ID for nsalab-automation'
        required: true
      app-private-key:
        description: 'GitHub App private key for nsalab-automation'
        required: true

jobs:
  auto-project:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ github.repository_owner }}

      - name: Add issue to project
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue = context.payload.issue;

            if (!issue) {
              core.warning('No issue found in event payload — skipping');
              return;
            }

            const org = context.repo.owner;
            const projectNumber = ${{ inputs.project-number }};

            // Get project node ID
            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    title
                  }
                }
              }
            `, { org, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            if (!project) {
              core.setFailed(`Project #${projectNumber} not found in org ${org}`);
              return;
            }

            // Check if issue is already on the board (prevents duplicates if
            // Layer 1 auto-add or a retry already added it)
            const existingQuery = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project {
                          number
                        }
                      }
                    }
                  }
                }
              }
            `, { issueId: issue.node_id });

            const existingItem = existingQuery.node.projectItems?.nodes.find(
              item => item.project.number === projectNumber
            );

            let itemId;
            if (existingItem) {
              itemId = existingItem.id;
              core.info(`Issue #${issue.number} already on project "${project.title}" — using existing item`);
              core.summary.addRaw(`✓ Issue #${issue.number} already on project "${project.title}" (#${projectNumber})\n`);
            } else {
              const mutation = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item {
                      id
                    }
                  }
                }
              `, { projectId: project.id, contentId: issue.node_id });

              itemId = mutation.addProjectV2ItemById?.item?.id;
              if (!itemId) {
                core.setFailed('GraphQL mutation returned no item ID — issue may not have been added');
                return;
              }

              core.info(`Added issue #${issue.number} to project "${project.title}"`);
              core.summary.addRaw(`✓ Added issue #${issue.number} to project "${project.title}" (#${projectNumber})\n`);
            }

            // Set default Status if provided
            const defaultStatus = '${{ inputs.default-status }}';
            if (defaultStatus) {
              const fieldsQuery = await github.graphql(`
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { projectId: project.id });

              const statusField = fieldsQuery.node.fields.nodes.find(
                f => f.name && f.name.toLowerCase() === 'status'
              );

              if (!statusField) {
                core.warning('No "Status" field found on the project — skipping status assignment');
              } else {
                const statusOption = statusField.options.find(o => o.name === defaultStatus);
                if (!statusOption) {
                  core.warning(`Status option "${defaultStatus}" not found — available: ${statusField.options.map(o => o.name).join(', ')}`);
                } else {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `, {
                    projectId: project.id,
                    itemId,
                    fieldId: statusField.id,
                    optionId: statusOption.id,
                  });
                  core.info(`Set Status to "${defaultStatus}"`);
                  core.summary.addRaw(`✓ Set Status to "${defaultStatus}"\n`);
                }
              }
            }

            // Set native issue type from label mapping or default
            const typeMappingRaw = `${{ inputs.type-mapping }}`;
            const defaultType = '${{ inputs.default-type }}';
            if (!typeMappingRaw && !defaultType) {
              await core.summary.write();
              return;
            }

            let typeMapping = {};
            if (typeMappingRaw) {
              try {
                typeMapping = JSON.parse(typeMappingRaw);
              } catch (e) {
                core.warning(`Invalid type-mapping JSON: ${e.message} — skipping type assignment`);
                await core.summary.write();
                return;
              }
            }

            // Skip if issue already has a type set
            if (issue.issue_type) {
              core.info(`Issue already has type "${issue.issue_type.name}" — not overriding`);
              core.summary.addRaw(`✓ Issue type already set: "${issue.issue_type.name}"\n`);
              await core.summary.write();
              return;
            }

            // Find matching label
            const issueLabels = issue.labels.map(l => l.name);
            let targetType = null;
            let matchedLabel = null;

            for (const [label, typeName] of Object.entries(typeMapping)) {
              if (issueLabels.includes(label)) {
                targetType = typeName;
                matchedLabel = label;
                break;
              }
            }

            if (!targetType) {
              if (defaultType) {
                targetType = defaultType;
                matchedLabel = '(default)';
              } else {
                core.info('No labels matched type-mapping and no default-type — skipping type assignment');
                core.summary.addRaw('No labels matched type-mapping — Type not set\n');
                await core.summary.write();
                return;
              }
            }

            // Get available native issue types from the repo
            const typesQuery = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  issueTypes(first: 50) {
                    nodes {
                      id
                      name
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            const issueTypes = typesQuery.repository.issueTypes?.nodes || [];

            if (issueTypes.length === 0) {
              core.warning('No native issue types found on this repo — skipping type assignment');
              core.summary.addRaw('⚠ No native issue types configured on this repo\n');
              await core.summary.write();
              return;
            }

            const targetIssueType = issueTypes.find(t => t.name === targetType);
            if (!targetIssueType) {
              core.warning(`Issue type "${targetType}" not found — available: ${issueTypes.map(t => t.name).join(', ')}`);
              core.summary.addRaw(`⚠ Issue type "${targetType}" not found — available: ${issueTypes.map(t => t.name).join(', ')}\n`);
              await core.summary.write();
              return;
            }

            // Set the native issue type
            await github.graphql(`
              mutation($issueId: ID!, $issueTypeId: ID!) {
                updateIssue(input: {id: $issueId, issueTypeId: $issueTypeId}) {
                  issue {
                    id
                  }
                }
              }
            `, { issueId: issue.node_id, issueTypeId: targetIssueType.id });

            core.info(`Set issue type to "${targetType}" (matched label "${matchedLabel}")`);
            core.summary.addRaw(`✓ Set issue type to "${targetType}" (matched label \`${matchedLabel}\`)\n`);
            await core.summary.write();
