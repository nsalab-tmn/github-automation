name: engineering-agent
run-name: "[${{github.run_number}}] Engineering agent [${{github.event_name}}]"

on:
  workflow_dispatch:
    inputs:
      issue-url:
        description: 'Optional: specific issue URL to work on (skips selection)'
        required: false
        type: string
      dry-run:
        description: 'Dry run — gather + decide only, skip implementation'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: engineering-agent
  cancel-in-progress: false

jobs:
  engineering-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout github-automation
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MECHANIC_CLIENT_ID }}
          private-key: ${{ secrets.MECHANIC_PRIVATE_KEY }}
          owner: nsalab-tmn

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Parse config
        id: config
        env:
          CONFIG_FILE: config/engineering-agent.yaml
        run: ./scripts/parse-config.sh >> "$GITHUB_OUTPUT"

      # Step 0: Unblock check
      - name: Check blocked items
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: nsalab-tmn
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          STATUS_BLOCKED: ${{ steps.config.outputs.status_blocked }}
          STATUS_BACKLOG: ${{ steps.config.outputs.status_backlog }}
        run: ./scripts/check-blocked.sh

      # Step 1: Select issue
      - name: Select issue
        id: select
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: nsalab-tmn
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          EXCLUDED_LABELS: ${{ steps.config.outputs.excluded_labels }}
          ELIGIBLE_STATUSES: ${{ steps.config.outputs.eligible_statuses }}
          REQUIRE_LABELS: ${{ steps.config.outputs.require_labels }}
          MAX_ATTEMPTS: ${{ steps.config.outputs.max_attempts }}
          MANUAL_ISSUE_URL: ${{ inputs.issue-url }}
        run: |
          if [[ -n "$MANUAL_ISSUE_URL" ]]; then
            REPO=$(echo "$MANUAL_ISSUE_URL" | grep -oP 'github\.com/\K[^/]+/[^/]+')
            NUM=$(echo "$MANUAL_ISSUE_URL" | grep -oP '/issues/\K\d+')
            gh api "repos/${REPO}/issues/${NUM}" --jq '{
              issue_id: .node_id, issue_number: .number, title: .title,
              body: (.body // ""), created_at: .created_at, repo: "'"${REPO}"'",
              labels: [.labels[].name], assignees: [.assignees[].login]
            }' > selected-issue.json
          else
            ./scripts/select-issue.sh > selected-issue.json
          fi
          if [[ ! -s selected-issue.json ]] || [[ "$(cat selected-issue.json)" == "" ]]; then
            echo "selected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "selected=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$(jq -r '.issue_number' selected-issue.json)" >> "$GITHUB_OUTPUT"
          echo "issue_repo=$(jq -r '.repo' selected-issue.json)" >> "$GITHUB_OUTPUT"
          echo "issue_id=$(jq -r '.issue_id' selected-issue.json)" >> "$GITHUB_OUTPUT"

      # Step 2: Claim issue (skipped in dry-run)
      - name: Claim issue
        if: steps.select.outputs.selected == 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          ISSUE_ID: ${{ steps.select.outputs.issue_id }}
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          TARGET_STATUS: ${{ steps.config.outputs.status_in_progress }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: ./scripts/claim-issue.sh

      # Step 3: Gather context
      - name: Gather issue context
        if: steps.select.outputs.selected == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          PROJECTS_JSON: ${{ steps.config.outputs.projects }}
          TARGET_REPO: ${{ steps.select.outputs.issue_repo }}
        run: |
          KB_INFO=$(./scripts/resolve-kb.sh)
          export KB_REPO=$(echo "$KB_INFO" | awk '{print $1}')
          export KB_CONV_PATH=$(echo "$KB_INFO" | awk '{print $2}')
          ./scripts/gather-issue-context.sh > issue-context.json

      # Step 4: Compile brief (Decide phase)
      - name: Compile implementation brief
        id: brief
        if: steps.select.outputs.selected == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 ./scripts/compile-brief.py issue-context.json prompts/engineering-brief.md schemas/compile-brief.json > brief.json
          echo "already_resolved=$(jq -r '.already_resolved' brief.json)" >> "$GITHUB_OUTPUT"
          echo "workable=$(jq -r '.workable' brief.json)" >> "$GITHUB_OUTPUT"
          echo "confidence=$(jq -r '.confidence' brief.json)" >> "$GITHUB_OUTPUT"
          echo "::notice::Already resolved: $(jq -r '.already_resolved' brief.json), Workable: $(jq -r '.workable' brief.json), Confidence: $(jq -r '.confidence' brief.json)"

      # Handle already-resolved (skipped in dry-run)
      - name: Handle already-resolved issue
        if: steps.select.outputs.selected == 'true' && steps.brief.outputs.already_resolved == 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          RESOLUTION: ${{ steps.brief.outputs.resolution_comment || 'No details provided' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          RESOLUTION=$(jq -r '.resolution_comment // "No details provided"' brief.json)
          export RESOLUTION
          ./scripts/close-resolved.sh

      # Handle not-workable (skipped in dry-run)
      - name: Handle not-workable issue
        if: steps.select.outputs.selected == 'true' && steps.brief.outputs.already_resolved != 'true' && steps.brief.outputs.workable == 'false' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          ISSUE_ID: ${{ steps.select.outputs.issue_id }}
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          TARGET_STATUS: ${{ steps.config.outputs.status_blocked }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          OBJECTIVE=$(jq -r 'if .brief | type == "object" then .brief.objective // "N/A" else .brief // "N/A" end' brief.json)
          BLOCKERS=$(jq -r '.blockers // [] | .[] | "- **\(.type):** \(.detail)"' brief.json | head -10)
          export STATUS=not-workable BRIEF="$OBJECTIVE" RESULT="Issue deemed not workable" BLOCKERS
          ./scripts/record-attempt.sh
          ./scripts/mark-needs-triage.sh
          echo "::warning::Issue deemed not workable — moved to Blocked with needs-triage"

      # Step 5: Implement (Claude Code CLI)
      - name: Checkout target repo
        if: steps.select.outputs.selected == 'true' && steps.brief.outputs.workable == 'true' && inputs.dry-run != true
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.select.outputs.issue_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Implement changes
        id: implement
        if: steps.select.outputs.selected == 'true' && steps.brief.outputs.workable == 'true' && inputs.dry-run != true
        timeout-minutes: ${{ fromJSON(steps.config.outputs.timeout_minutes) }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          MAX_FILE_COUNT: ${{ steps.config.outputs.max_file_count }}
          MAX_DIFF_LINES: ${{ steps.config.outputs.max_diff_lines }}
        run: |
          cd target-repo
          BRANCH=$(jq -r '.brief.branch_name' ../brief.json)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          BRIEF=$(jq -r '.brief | to_entries | map("**\(.key):** \(.value)") | join("\n\n")' ../brief.json)
          npx -y @anthropic-ai/claude-code@latest -p \
            "You are implementing issue #${ISSUE_NUMBER} in ${ISSUE_REPO}.
          Here is your implementation brief — follow it precisely:
          ${BRIEF}
          IMPORTANT:
          - Only modify files listed in key_files unless you discover additional files that need changes
          - Follow the conventions listed in the brief
          - Keep changes minimal and focused on the objective
          - Do not add unrelated improvements
          - Do not modify files outside this repository" \
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git diff:*),Bash(git status),Bash(mkdir:*),Bash(ls:*)" \
            --max-turns 50

          git add -A
          CHANGED_FILES=$(git diff --cached --name-only | wc -l)
          DIFF_LINES=$(git diff --cached --stat | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")

          if [[ "$CHANGED_FILES" -gt "$MAX_FILE_COUNT" ]]; then
            echo "::error::Changed ${CHANGED_FILES} files (max: ${MAX_FILE_COUNT})"
            git reset HEAD >/dev/null
            exit 1
          fi
          if [[ "$DIFF_LINES" -gt "$MAX_DIFF_LINES" ]]; then
            echo "::error::Diff is ${DIFF_LINES} lines (max: ${MAX_DIFF_LINES})"
            git reset HEAD >/dev/null
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "changes_made=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes_made=true" >> "$GITHUB_OUTPUT"
          fi

      # Step 6: Create PR
      - name: Create pull request
        id: pr
        if: steps.select.outputs.selected == 'true' && steps.implement.outputs.changes_made == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
        run: |
          cd target-repo
          BRANCH=$(jq -r '.brief.branch_name' ../brief.json)
          COMMIT_MSG=$(jq -r '.brief.commit_message' ../brief.json)
          OBJECTIVE=$(jq -r '.brief.objective' ../brief.json)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          git -c user.name="nsalab-mechanic[bot]" \
              -c user.email="nsalab-mechanic[bot]@users.noreply.github.com" \
              commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"

          gh label create ai-generated --repo "$ISSUE_REPO" \
            --color "BFD4F2" --description "Created by engineering agent" \
            2>/dev/null || true

          PR_URL=$(gh pr create --repo "$ISSUE_REPO" --title "$COMMIT_MSG" \
            --body "## Summary
          ${OBJECTIVE}
          Closes #${ISSUE_NUMBER}
          ## Type of change
          - [x] Automated fix (engineering agent)
          ## Test plan
          - [ ] Review changes match the issue requirements
          - [ ] Verify CI checks pass
          ---
          *Created by [engineering agent](${RUN_URL})*" \
            --label "ai-generated")
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::PR created: ${PR_URL}"

      # Handle no changes — move to Blocked
      - name: Handle no changes
        if: steps.select.outputs.selected == 'true' && steps.implement.outputs.changes_made == 'false' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          ISSUE_ID: ${{ steps.select.outputs.issue_id }}
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
          TARGET_STATUS: ${{ steps.config.outputs.status_blocked }}
        run: |
          ./scripts/mark-needs-triage.sh
          echo "::warning::No changes produced — moved to Blocked with needs-triage"

      # Record attempt
      - name: Record attempt
        if: always() && steps.select.outputs.selected == 'true' && steps.brief.outputs.workable == 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_REPO: ${{ steps.select.outputs.issue_repo }}
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          OBJECTIVE=$(jq -r 'if .brief | type == "object" then .brief.objective // "N/A" else "N/A" end' brief.json 2>/dev/null || echo "N/A")
          if [[ -n "${{ steps.pr.outputs.pr_url }}" ]]; then
            export STATUS=completed RESULT="PR created: ${{ steps.pr.outputs.pr_url }}"
          elif [[ "${{ steps.implement.outputs.changes_made }}" == "false" ]]; then
            export STATUS=failed RESULT="Agent made no changes to the codebase"
          else
            export STATUS=failed RESULT="Implementation did not produce a PR"
          fi
          CHANGED=$(cd target-repo 2>/dev/null && git diff --name-only HEAD~1 2>/dev/null | sed 's/^/`/;s/$/`/' | paste -sd', ' || echo "none")
          export BRIEF="$OBJECTIVE" FILES_TOUCHED="$CHANGED"
          ./scripts/record-attempt.sh

      # Session summary
      - name: Session summary
        if: always()
        env:
          AGENT_NAME: Engineering Agent
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
          SELECTED: ${{ steps.select.outputs.selected }}
          SUMMARY_ITEM: "${{ steps.select.outputs.issue_repo }}#${{ steps.select.outputs.issue_number }}"
          RESULT_FILE: brief.json
          RESULT_FIELDS: >-
            "**Workable:** \(.workable)\n**Confidence:** \(.confidence)\n**Summary:** \(if .brief | type == \"object\" then .brief.objective // \"N/A\" else \"N/A\" end)"
        run: ./scripts/session-summary.sh
