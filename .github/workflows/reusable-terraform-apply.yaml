name: reusable - terraform-apply

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: terraform
        description: Directory containing Terraform config
      terraform-version:
        type: string
        default: latest
        description: Terraform version to install
      backend-key:
        type: string
        default: ""
        description: Override backend state key (passed via -backend-config). If empty, uses backend.tf.
    secrets:
      doorman-client-id:
        required: true
      doorman-private-key:
        required: true
      arm-client-id:
        required: true
      arm-client-secret:
        required: true
      arm-tenant-id:
        required: true
      arm-subscription-id:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    concurrency:
      group: terraform-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.doorman-client-id }}
          private-key: ${{ secrets.doorman-private-key }}
          owner: nsalab-tmn

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.arm-client-id }}
          ARM_CLIENT_SECRET: ${{ secrets.arm-client-secret }}
          ARM_TENANT_ID: ${{ secrets.arm-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.arm-subscription-id }}
          BACKEND_KEY: ${{ inputs.backend-key }}
        run: |
          if [ -n "$BACKEND_KEY" ]; then
            terraform init -backend-config="key=${BACKEND_KEY}"
          else
            terraform init
          fi

      - name: Terraform apply
        env:
          TF_VAR_github_token: ${{ steps.app-token.outputs.token }}
          TF_VAR_github_owner: nsalab-tmn
          TF_VAR_self_repo_name: ${{ github.event.repository.name }}
          ARM_CLIENT_ID: ${{ secrets.arm-client-id }}
          ARM_CLIENT_SECRET: ${{ secrets.arm-client-secret }}
          ARM_TENANT_ID: ${{ secrets.arm-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.arm-subscription-id }}
        run: terraform apply -auto-approve

